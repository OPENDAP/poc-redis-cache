name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  cpp-build-and-test:
    name: C++ Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install C++ and Redis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libcppunit-dev \
            libhiredis-dev \
            redis-server

      - name: Start Redis
        run: |
          sudo systemctl start redis-server
          redis-cli ping

      - name: Clean Redis state for tests
        run: redis-cli FLUSHALL

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build active C++ targets
        run: cmake --build build -j2

      - name: Run CTest
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
          REDIS_DB: "0"
        run: ctest --test-dir build --output-on-failure

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check

      - name: Initialize Terraform without backend
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate

  shellcheck-userdata:
    name: Shellcheck userdata
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint userdata script
        run: shellcheck Terraform/userdata.sh
