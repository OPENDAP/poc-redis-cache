name: Main Integration

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  cpp-build-and-test:
    name: C++ Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install C++ and Redis dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libcppunit-dev \
            libhiredis-dev \
            redis-server

      - name: Start Redis
        run: |
          sudo systemctl start redis-server
          redis-cli ping

      - name: Clean Redis state for tests
        run: redis-cli FLUSHALL

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build active C++ targets
        run: cmake --build build -j2

      - name: Run CTest and capture logs
        env:
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: "6379"
          REDIS_DB: "0"
        run: |
          mkdir -p artifacts
          set -o pipefail
          ctest --test-dir build --output-on-failure | tee artifacts/ctest-output.log

      - name: Collect CTest files
        # If: always() ensures this step runs even if the previous step fails, so we 
        # can collect logs and artifacts for debugging. jhrg 3/18/26
        if: always()
        run: |
          mkdir -p artifacts
          if [ -f build/Testing/Temporary/LastTest.log ]; then
            cp build/Testing/Temporary/LastTest.log artifacts/
          fi
          if [ -d build/Testing/Temporary ]; then
            find build/Testing/Temporary -maxdepth 1 -type f -name '*.log' -print -exec cp {} artifacts/ \;
          fi

      - name: Upload C++ test artifacts
        # This will upload the 'artifacts' to the GitHub Actions artifact storage Limited to 500MB. jhrg 3/18/26
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-artifacts
          path: artifacts/
          if-no-files-found: warn

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Terraform

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check

      - name: Initialize Terraform without backend
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate

  shellcheck-userdata:
    name: Shellcheck userdata
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint userdata script
        run: shellcheck Terraform/userdata.sh

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    # Wait for terraform-validate to complete before running terraform-plan, 
    # since it depends on the Terraform configuration being valid. jhrg 3/18/26
    needs:
      - terraform-validate
    # Permission for this job. It can read the local repo and write an OIDC token 
    # if using a role to assume. The 'write' permission does not mean the job can
    # write to the repository. jhrg 3/18/26
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: Terraform

    env:
      AWS_REGION: us-west-2

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      # This baroque step is necessary to support both OIDC-based credential configuration
      # (for security best practices) and traditional access key configuration (for 
      # compatibility with existing setups). It detects which method of AWS credential 
      # configuration is available based on the presence of specific secrets and sets output
      # variables accordingly. Subsequent steps can then conditionally execute based on these
      # outputs to configure AWS credentials properly for the Terraform plan.
      #
      # Why not 'just use and if:'? Because GitHub Actions does not support using 
      # ${{ secrets.... }} in 'if conditions.' Grrrr jhrg 3/18/26
      - name: Detect AWS credential configuration
        id: aws-auth
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        run: |
          if [ -n "$AWS_ROLE_TO_ASSUME" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "use_oidc=true" >> "$GITHUB_OUTPUT"
            echo "use_access_keys=false" >> "$GITHUB_OUTPUT"
          elif [ -n "$AWS_ACCESS_KEY_ID" ]; then
            echo "has_credentials=true" >> "$GITHUB_OUTPUT"
            echo "use_oidc=false" >> "$GITHUB_OUTPUT"
            echo "use_access_keys=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_credentials=false" >> "$GITHUB_OUTPUT"
            echo "use_oidc=false" >> "$GITHUB_OUTPUT"
            echo "use_access_keys=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials with OIDC (OpenID Connect)
        if: steps.aws-auth.outputs.use_oidc == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS credentials with access keys
        if: steps.aws-auth.outputs.use_access_keys == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Skip Terraform plan when AWS credentials are unavailable
        if: steps.aws-auth.outputs.has_credentials != 'true'
        run: echo "Skipping terraform plan because AWS credentials are not configured."

      - name: Initialize Terraform
        if: steps.aws-auth.outputs.has_credentials == 'true'
        run: terraform init

      - name: Create Terraform plan artifact
        if: steps.aws-auth.outputs.has_credentials == 'true'
        run: |
          terraform plan -out=tfplan
          terraform show -no-color tfplan > tfplan.txt

      - name: Upload Terraform plan artifact
        if: steps.aws-auth.outputs.has_credentials == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: |
            Terraform/tfplan
            Terraform/tfplan.txt
          if-no-files-found: error
